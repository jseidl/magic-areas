name: "Validate"

on:
  workflow_dispatch:
  schedule:
    - cron:  "0 0 * * *"
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  hassfest: # https://developers.home-assistant.io/blog/2020/04/16/hassfest
    name: "Hassfest Validation"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v6"

        - name: "Run hassfest validation"
          uses: "home-assistant/actions/hassfest@master"

  hacs: # https://github.com/hacs/action
    name: "HACS Validation"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v6"

        - name: "Run HACS validation"
          uses: "hacs/action@main"
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            category: integration

  translations:
    name: "Translations Sync Check"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v6"

        - name: "Check translations/en.json is in sync with strings.json"
          run: |
            diff custom_components/magic_areas/strings.json \
                 custom_components/magic_areas/translations/en.json \
              || (echo "ERROR: translations/en.json is out of sync with strings.json. Run scripts/sync-translations to fix." && exit 1)